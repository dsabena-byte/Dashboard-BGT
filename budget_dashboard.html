<h2 class="sr-only">Monitoreo BGT Marketing</h2>
<h1 style="font-size:22px;font-weight:500;color:#ffffff;margin-bottom:1rem">Monitoreo BGT Marketing</h1>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans,system-ui);font-size:14px;background:#0a0a0a;color:#ffffff;padding:1rem;min-height:100vh}
label{font-size:12px;color:#ffffff;font-weight:500}
select{width:100%;padding:6px 8px;border:1px solid #444;border-radius:6px;background:#1a1a1a;color:#ffffff;font-size:13px;cursor:pointer}
select option{background:#1a1a1a;color:#ffffff}
.filters{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:1rem}
.fg{display:flex;flex-direction:column;gap:4px}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1rem}
.kpi{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:12px 14px}
.kpi-label{font-size:11px;color:#cccccc;font-weight:500;margin-bottom:4px}
.kpi-val{font-size:18px;font-weight:500;color:#ffffff;word-break:break-all}
.kpi-sub{font-size:11px;color:#aaaaaa;margin-top:2px}
.pos{color:#4ade80}.neg{color:#f87171}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem}
.chart-box{background:#111111;border:1px solid #333;border-radius:10px;padding:12px}
.chart-title{font-size:12px;font-weight:500;color:#ffffff;margin-bottom:6px}
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:6px;font-size:11px;color:#ffffff}
.leg-dot{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:4px}
.toggle-row{display:flex;gap:8px;margin-bottom:1rem;align-items:center}
.tbtn{padding:4px 14px;border:1px solid #444;border-radius:6px;background:#1a1a1a;color:#cccccc;cursor:pointer;font-size:12px}
.tbtn.active{background:#333;color:#ffffff;font-weight:500;border-color:#666}
.table-wrap{overflow-x:auto;border:1px solid #333;border-radius:10px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#1a1a1a;color:#ffffff;font-weight:500;padding:9px 10px;text-align:left;white-space:nowrap;border-bottom:1px solid #333}
td{padding:7px 10px;border-top:1px solid #222;white-space:nowrap;color:#ffffff}
tr:hover td{background:#1a1a1a}
.rango-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:640px){.chart-row{grid-template-columns:1fr}.kpi-grid{grid-template-columns:repeat(2,1fr)}}
</style>

<div class="filters">
  <div class="fg"><label>Presupuesto A</label><select id="bgtA"></select></div>
  <div class="fg"><label>Presupuesto B</label><select id="bgtB"></select></div>
  <div class="fg"><label>Período</label>
    <select id="period">
      <option value="anual">Año completo</option>
      <option value="c1">Cuatrimestre 1 (Ene–Abr)</option>
      <option value="c2">Cuatrimestre 2 (May–Ago)</option>
      <option value="c3">Cuatrimestre 3 (Sep–Dic)</option>
      <option value="rango">Rango de meses</option>
    </select>
  </div>
  <div class="fg"><label>Cuenta</label><select id="cuentaEl"><option value="">Todas</option></select></div>
</div>

<div id="rango-wrap" style="display:none;margin-bottom:1rem">
  <div class="rango-row">
    <div class="fg"><label>Desde</label>
      <select id="mesDesde">
        <option>ENERO</option><option>FEBRERO</option><option>MARZO</option><option>ABRIL</option>
        <option>MAYO</option><option>JUNIO</option><option>JULIO</option><option>AGOSTO</option>
        <option>SEPTIEMBRE</option><option>OCTUBRE</option><option>NOVIEMBRE</option><option>DICIEMBRE</option>
      </select>
    </div>
    <div class="fg"><label>Hasta</label>
      <select id="mesHasta">
        <option>ENERO</option><option>FEBRERO</option><option>MARZO</option><option>ABRIL</option>
        <option>MAYO</option><option>JUNIO</option><option>JULIO</option><option selected>AGOSTO</option>
        <option>SEPTIEMBRE</option><option>OCTUBRE</option><option>NOVIEMBRE</option><option>DICIEMBRE</option>
      </select>
    </div>
  </div>
</div>

<div class="toggle-row">
  <span style="font-size:12px;color:#ffffff;font-weight:500">Moneda:</span>
  <button class="tbtn active" id="btnARS" onclick="setCur('ARS')">$ ARS</button>
  <button class="tbtn" id="btnUSD" onclick="setCur('USD')">USD</button>
</div>

<div class="kpi-grid" id="kpis"></div>

<div class="chart-row">
  <div class="chart-box">
    <div class="chart-title">Evolución mensual</div>
    <div class="legend">
      <span><span class="leg-dot" style="background:#60a5fa"></span><span id="lA">A</span></span>
      <span><span class="leg-dot" style="background:#f87171"></span><span id="lB">B</span></span>
    </div>
    <div style="position:relative;width:100%;height:220px"><canvas id="cBar" role="img" aria-label="Evolución mensual comparada">Evolución mensual</canvas></div>
  </div>
  <div class="chart-box">
    <div class="chart-title">Distribución por cuenta — Ppto A</div>
    <div style="position:relative;width:100%;height:220px"><canvas id="cDonut" role="img" aria-label="Distribución por cuenta">Distribución</canvas></div>
  </div>
</div>
<div class="chart-row">
  <div class="chart-box" style="grid-column:1/-1">
    <div class="chart-title">Acumulado del período</div>
    <div class="legend">
      <span><span class="leg-dot" style="background:#60a5fa"></span><span id="lA2">A</span></span>
      <span><span class="leg-dot" style="background:#f87171"></span><span id="lB2">B</span></span>
    </div>
    <div style="position:relative;width:100%;height:190px"><canvas id="cLine" role="img" aria-label="Acumulado del período">Acumulado</canvas></div>
  </div>
</div>

<div class="table-wrap">
  <table>
    <thead><tr>
      <th>Cuenta</th><th>Concepto</th>
      <th id="thA">Ppto A</th><th id="thB">Ppto B</th>
      <th>Diferencia</th><th>% Var</th>
    </tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const MESES = ['ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO','JULIO','AGOSTO','SEPTIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'];
const MS = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const CC = {c1:[0,1,2,3], c2:[4,5,6,7], c3:[8,9,10,11]};
const PIE_COLORS = ['#60a5fa','#f87171','#34d399','#fbbf24','#a78bfa','#fb923c','#22d3ee','#e879f9','#4ade80','#f472b6'];

let cur = 'ARS', cBar, cDonut, cLine;

let DATA = [];

function getV(r){ return cur==='ARS'?r[5]:r[6]; }
function fmt(v){
  const s = Intl.NumberFormat('es-AR').format(Math.abs(Math.round(v)));
  return (v<0?'-':'') + (cur==='ARS'?'$':'USD ') + s;
}

function getMths(period, desde, hasta){
  if(period==='anual') return MESES;
  if(period==='c1') return MESES.slice(0,4);
  if(period==='c2') return MESES.slice(4,8);
  if(period==='c3') return MESES.slice(8,12);
  // rango
  const di = MESES.indexOf(desde), hi = MESES.indexOf(hasta);
  if(di<=hi) return MESES.slice(di, hi+1);
  return MESES.slice(di).concat(MESES.slice(0, hi+1));
}

function filterD(ppto, mths, cuenta){
  return DATA.filter(r=> r[0]===ppto && mths.includes(r[3]) && (cuenta===''||r[1]===cuenta));
}
function sumD(arr){ return {a:arr.reduce((s,r)=>s+r[5],0), u:arr.reduce((s,r)=>s+r[6],0)}; }
function gs(s){ return cur==='ARS'?s.a:s.u; }

function populateSelects(){
  const pptos = [...new Set(DATA.map(r=>r[0]))].sort();
  const sA=document.getElementById('bgtA'), sB=document.getElementById('bgtB');
  pptos.forEach((p,i)=>{ sA.add(new Option(p,p)); const o=new Option(p,p); if(i===1)o.selected=true; sB.add(o); });
  const cuentas=[...new Set(DATA.map(r=>r[1]))].sort();
  const sC=document.getElementById('cuentaEl');
  cuentas.forEach(c=>sC.add(new Option(c,c)));
}

function render(){
  const pA=document.getElementById('bgtA').value;
  const pB=document.getElementById('bgtB').value;
  const period=document.getElementById('period').value;
  const desde=document.getElementById('mesDesde').value;
  const hasta=document.getElementById('mesHasta').value;
  const cuenta=document.getElementById('cuentaEl').value;

  document.getElementById('rango-wrap').style.display = period==='rango'?'':'none';
  ['lA','lA2'].forEach(id=>document.getElementById(id).textContent=pA);
  ['lB','lB2'].forEach(id=>document.getElementById(id).textContent=pB);
  document.getElementById('thA').textContent=pA;
  document.getElementById('thB').textContent=pB;

  const mths=getMths(period,desde,hasta);
  const rA=filterD(pA,mths,cuenta), rB=filterD(pB,mths,cuenta);
  const sA=sumD(rA), sB=sumD(rB);
  const vA=gs(sA), vB=gs(sB), diff=vA-vB;
  const pct=vB!==0?((vA-vB)/Math.abs(vB)*100):0;

  document.getElementById('kpis').innerHTML=`
    <div class="kpi"><div class="kpi-label">${pA}</div><div class="kpi-val">${fmt(vA)}</div></div>
    <div class="kpi"><div class="kpi-label">${pB}</div><div class="kpi-val">${fmt(vB)}</div></div>
    <div class="kpi"><div class="kpi-label">Diferencia (A − B)</div><div class="kpi-val ${diff>=0?'pos':'neg'}">${fmt(diff)}</div></div>
    <div class="kpi"><div class="kpi-label">Variación %</div><div class="kpi-val ${pct>=0?'pos':'neg'}">${pct>=0?'+':''}${pct.toFixed(1)}%</div><div class="kpi-sub">${pA} vs ${pB}</div></div>`;

  const labels=mths.map(m=>MS[MESES.indexOf(m)]);
  const dA=mths.map(m=>Math.round(gs(sumD(rA.filter(r=>r[3]===m)))));
  const dB=mths.map(m=>Math.round(gs(sumD(rB.filter(r=>r[3]===m)))));

  const gridC='rgba(255,255,255,0.08)', tickC='#ffffff';
  if(cBar) cBar.destroy();
  cBar=new Chart(document.getElementById('cBar'),{type:'bar',
    data:{labels,datasets:[{label:pA,data:dA,backgroundColor:'#60a5fa',borderRadius:3},{label:pB,data:dB,backgroundColor:'#f87171',borderRadius:3}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+fmt(c.raw)},backgroundColor:'#1a1a1a',titleColor:'#fff',bodyColor:'#fff',borderColor:'#444',borderWidth:1}},
      scales:{x:{ticks:{color:tickC,font:{size:10},autoSkip:false,maxRotation:45},grid:{color:gridC}},y:{ticks:{color:tickC,callback:v=>fmt(v),font:{size:10}},grid:{color:gridC}}}}});

  const cats=[...new Set(rA.map(r=>r[1]))];
  const dDon=cats.map(c=>Math.abs(Math.round(gs(sumD(rA.filter(r=>r[1]===c))))));
  if(cDonut) cDonut.destroy();
  cDonut=new Chart(document.getElementById('cDonut'),{type:'doughnut',
    data:{labels:cats,datasets:[{data:dDon,backgroundColor:PIE_COLORS.slice(0,cats.length),borderWidth:2,borderColor:'#111'}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:true,position:'bottom',labels:{color:'#ffffff',font:{size:10},boxWidth:10,padding:6}}}}});

  let cA2=0,cB2=0;
  const cumA=dA.map(v=>{cA2+=v;return cA2;}), cumB=dB.map(v=>{cB2+=v;return cB2;});
  if(cLine) cLine.destroy();
  cLine=new Chart(document.getElementById('cLine'),{type:'line',
    data:{labels,datasets:[
      {label:pA,data:cumA,borderColor:'#60a5fa',backgroundColor:'rgba(96,165,250,0.08)',tension:0.3,pointRadius:3,fill:true},
      {label:pB,data:cumB,borderColor:'#f87171',backgroundColor:'rgba(248,113,113,0.05)',tension:0.3,pointRadius:3,borderDash:[5,3],fill:true}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+fmt(c.raw)},backgroundColor:'#1a1a1a',titleColor:'#fff',bodyColor:'#fff',borderColor:'#444',borderWidth:1}},
      scales:{x:{ticks:{color:tickC,font:{size:10}}},y:{ticks:{color:tickC,callback:v=>fmt(v),font:{size:10}},grid:{color:gridC}}}}});

  const keys=[...new Set([...rA.map(r=>r[1]+'||'+r[4]),...rB.map(r=>r[1]+'||'+r[4])])].sort();
  const tbody=document.getElementById('tbody');
  tbody.innerHTML='';
  keys.forEach(k=>{
    const [ct,conc]=k.split('||');
    const vA2=Math.round(gs(sumD(rA.filter(r=>r[1]===ct&&r[4]===conc))));
    const vB2=Math.round(gs(sumD(rB.filter(r=>r[1]===ct&&r[4]===conc))));
    const d2=vA2-vB2, p2=vB2!==0?((vA2-vB2)/Math.abs(vB2)*100):0;
    tbody.innerHTML+=`<tr><td style="color:#cccccc">${ct}</td><td>${conc}</td><td>${fmt(vA2)}</td><td>${fmt(vB2)}</td><td class="${d2>=0?'pos':'neg'}">${fmt(d2)}</td><td class="${p2>=0?'pos':'neg'}">${vB2===0?'—':p2.toFixed(1)+'%'}</td></tr>`;
  });
}

function setCur(c){
  cur=c;
  document.getElementById('btnARS').classList.toggle('active',c==='ARS');
  document.getElementById('btnUSD').classList.toggle('active',c==='USD');
  render();
}

async function loadData(){
  const url = (window.DATA_JSON_URL || 'data.json') + '?t=' + Date.now();
  const res = await fetch(url, {cache:'no-store'});
  if(!res.ok) throw new Error('No se pudo cargar data.json ('+res.status+')');
  const json = await res.json();
  DATA = Array.isArray(json) ? json : json.rows;
  if(!Array.isArray(DATA)) throw new Error('Formato invalido en data.json');
}

async function init(){
  try {
    await loadData();
    populateSelects();
    ['bgtA','bgtB','period','mesDesde','mesHasta','cuentaEl'].forEach(id=>document.getElementById(id).addEventListener('change',render));
    render();
  } catch (e) {
    document.getElementById('kpis').innerHTML = '<div class="kpi" style="grid-column:1/-1;border-color:#7f1d1d"><div class="kpi-label neg">Error cargando datos</div><div class="kpi-val" style="font-size:13px">'+e.message+'</div></div>';
  }
}

init();
</script>
